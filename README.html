# dashboard
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #1a2a4a;
  color: white;
  font-family: sans-serif;
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#top {
  height: 60%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  border-bottom: 1px solid rgba(255,255,255,0.15);
}

#bottom {
  height: 40%;
  display: flex;
  flex-direction: row;
  justify-content: center;
  align-items: center;
  gap: 40px;
}

#clock {
  font-family: 'Share Tech Mono', monospace;
  font-size: 18vw;
  color: #00e5ff;
  text-shadow: 0 0 20px #00e5ff88, 0 0 40px #00e5ff44;
  letter-spacing: 4px;
  line-height: 1;
}

#date {
  font-size: 2vw;
  margin-top: 12px;
  opacity: 0.65;
  letter-spacing: 2px;
}

#weather-icon {
  font-size: 6vw;
  line-height: 1;
}

#weather-temp {
  font-family: 'Share Tech Mono', monospace;
  font-size: 5vw;
  color: #00e5ff;
  text-shadow: 0 0 10px #00e5ff66;
}

#weather-info {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

#weather-label {
  font-size: 1.4vw;
  opacity: 0.6;
}

#weather-desc {
  font-size: 1.8vw;
  opacity: 0.8;
}

#weather-sub {
  font-size: 1.3vw;
  opacity: 0.5;
}

#sleep {
  display: none;
  width: 100vw;
  height: 100vh;
  background: black;
  position: fixed;
  top: 0; left: 0;
}
</style>
</head>
<body>

<div id="top">
  <div id="clock">--:--:--</div>
  <div id="date">取得中...</div>
</div>

<div id="bottom">
  <div id="weather-icon">:mostly_sunny:</div>
  <div id="weather-temp">--°C</div>
  <div id="weather-info">
    <div id="weather-label">川崎市の天気</div>
    <div id="weather-desc">-</div>
    <div id="weather-sub">-</div>
  </div>
</div>

<div id="sleep"></div>

<script>
const WEEKDAYS = ['日','月','火','水','木','金','土'];

function getWeatherEmoji(id) {
  if (id >= 200 && id < 300) return '⛈';
  if (id >= 300 && id < 400) return '🌦';
  if (id >= 500 && id < 600) return '🌧';
  if (id >= 600 && id < 700) return '❄️';
  if (id >= 700 && id < 800) return '🌫';
  if (id === 800) return '☀️';
  if (id === 801) return '🌤';
  if (id === 802) return '⛅';
  if (id >= 803) return ':cloud:';
  return ':thermometer:';
}

setInterval(()=>{
  const now = new Date();
  document.getElementById("clock").innerText =
    now.toLocaleTimeString('ja-JP', { hour12: false });
  const d = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${WEEKDAYS[now.getDay()]}）`;
  document.getElementById("date").innerText = d;
}, 1000);

const API_KEY = "edit";

function updateWeather(){
  fetch(`https://api.openweathermap.org/data/2.5/weather?q=Kawasaki,jp&appid=${API_KEY}&units=metric&lang=ja`)
  .then(r=>r.json())
  .then(data=>{
    const temp = Math.round(data.main.temp);
    const tmax = Math.round(data.main.temp_max);
    const tmin = Math.round(data.main.temp_min);
    const hum  = data.main.humidity;
    const id   = data.weather[0].id;
    const desc = data.weather[0].description;
    document.getElementById("weather-icon").innerText = getWeatherEmoji(id);
    document.getElementById("weather-temp").innerText = `${temp}°C`;
    document.getElementById("weather-desc").innerText = desc;
    document.getElementById("weather-sub").innerText  = `最高 ${tmax}°C　最低 ${tmin}°C　湿度 ${hum}%`;
  })
  .catch(()=>{
    document.getElementById("weather-desc").innerText = "天気取得失敗";
  });
}
updateWeather();
setInterval(updateWeather, 600000);

function updateDisplay(){
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes();
  const off = (h === 23 && m >= 50) || h < 5;
  document.getElementById("sleep").style.display = off ? "block" : "none";
}
setInterval(updateDisplay, 60000);
updateDisplay();
</script>

</body>
</html>
